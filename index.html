<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="converter.css">
</head>

<body>
    <div id="upper-body">
        <h1 class="bold-font">Metric/Imperial Unit Converter</h1>
        <input type="number" id="input-el">
        <button class="btn" id="convert-btn">Convert</button>
    </div>
    <div id="lower-body">
        <div class="units">
            <h4>
                Length (Meter/Feet)
            </h4>
            <p id="length-el"></p>
        </div>
        <div class="units">
            <h4>
                Volume (Liters/Gallons)
            </h4>
            <p id="volume-el"></p>
        </div>
        <div class="units">
            <h4>
                Mass (Kilograms/Pounds)
            </h4>
            <p id="mass-el"></p>
        </div>
    </div>
    <script src="index.js"></script>
</body>

</html>
